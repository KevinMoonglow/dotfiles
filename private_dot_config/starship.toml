# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ $directory](prompt_fg bg:prompt_bg)[Óāį](prompt_bg)\
($cmd_duration)$status\
([ÓÉó](git_bg)[ $git_branch$git_commit$git_state](prompt_fg bg:git_bg)[Óāį](git_bg))\
$fill\
[Óāļ](contrast)[ $shell](lunacy_pink bg:contrast)[Óāľ](contrast)\
([Óāļ](contrast)[ $hostname ](lunacy_pink bg:contrast)[Óāľ](contrast))
$character"""


palette = "lunacy"

# Inserts a blank line between shell prompts
add_newline = true

[palettes.lunacy]
prompt_fg = "#ffffff"
prompt_bg = "#01579b"
contrast = "#29315a"
lunacy_pink = "#ffaafc"
misc_bg = "#505a7f"
err_bg = "#990055"
git_bg = "#540086"

[character] 
success_symbol = '[‚ĚĮ](prompt_fg)'

[directory]
style = 'prompt_fg bg:prompt_bg'
home_symbol = 'ÔÄē '
truncation_symbol = '‚Ä¶/'

[hostname]
ssh_only = false
format = "$hostname"

[shell]
disabled = false
style = 'lunacy_pink bg:contrast'
fish_indicator = "ůįąļ "
zsh_indicator = "%_ "
bash_indicator = "ůĪÜÉ "

[cmd_duration]
format = '[ÓÉó](misc_bg)[ $duration ]($style)[Óāį](misc_bg)'
style = 'prompt_fg bg:misc_bg'

[status]
format = '[ÓÉó](err_bg)[ $symbol $status ($common_meaning)(SIG$signal_name\($signal_number\)) ]($style)[Óāį](err_bg)'
style = 'prompt_fg bg:err_bg'
disabled = false
symbol = "Ó™á"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'prompt_fg bg:git_bg'
